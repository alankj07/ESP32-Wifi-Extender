; =============================================================
; ESP32 WiFi Extender — PlatformIO Build Configuration
; =============================================================
; Target: ESP32 DevKit (compatible with SY-111 and all
;         standard ESP32-WROOM-32 based development boards)
; Framework: ESP-IDF (required for native NAPT/lwIP support)
; =============================================================

[platformio]
build_dir = C:/esp32_extender_build

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf

; Serial monitor baud rate (must match ESP_LOG output config)
monitor_speed = 115200

; Upload speed — increase for faster flashing
upload_speed = 921600

board_build.embed_txtfiles =
    src/index_html_gz.txt

